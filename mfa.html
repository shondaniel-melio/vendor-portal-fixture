<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Portal - MFA Verification</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Security check: Must pass username/password first
        if (sessionStorage.getItem('preAuth') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>
    <main class="login-container">
        <h1>Two-Factor Authentication</h1>
        <p style="margin-bottom: 20px; font-size: 14px; color: #555;">
            Please enter the 6-digit verification code sent to your device.
        </p>
        
        <form id="mfaForm">
            <div class="form-group">
                <label for="mfaCode">Verification Code</label>
                <input type="text" id="mfaCode" name="mfaCode" maxlength="6" pattern="\d{6}" required placeholder="Enter 6-digit code">
            </div>
            
            <button type="submit">Verify & Log in</button>
            <p id="mfaErrorMsg" class="error hidden">Invalid verification code</p>
        </form>
    </main>

    <script>
        document.getElementById('mfaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('mfaCode').value;
            
            if (code === '123456') {
                // Grant full authentication and remove the temporary flag
                sessionStorage.setItem('auth', 'true');
                sessionStorage.removeItem('preAuth');
                window.location.href = 'invoices.html';
            } else {
                document.getElementById('mfaErrorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
