<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Portal - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-container">
        <h1>Vendor Portal</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit">Log in</button>
            <p id="errorMsg" class="error hidden">Invalid username or password</p>
        </form>
    </main>

    <script>
        // Clear any existing session data on load to ensure a fresh start
        sessionStorage.clear();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'admin') {
                // Path 1: Direct access (No MFA)
                sessionStorage.setItem('auth', 'true');
                window.location.href = 'invoices.html';
                
            } else if (user === 'admin2' && pass === 'admin2') {
                // Path 2: Requires MFA
                sessionStorage.setItem('preAuth', 'true');
                window.location.href = 'mfa.html';
                
            } else {
                // Path 3: Invalid credentials
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
